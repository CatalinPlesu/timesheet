services:
  bot:
    image: ghcr.io/${REPO_OWNER}/timesheet-bot:${IMAGE_TAG}
    container_name: timesheet-telegram-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Database__ConnectionString=Data Source=/app/data/timesheet.db
      - Database__EnableSensitiveDataLogging=false
      - Database__EnableDetailedErrors=false
      - Bot__Token=${BOT_TOKEN}
      - FrontendUrl=${FRONTEND_EXTERNAL_URL}
      - EmployerApi__BaseUrl=${EMPLOYER_API_BASE_URL}
      - EmployerApi__AttendanceEndpoint=/api/TimeOff/getEmployeeAttendance
      - Workers__AutoShutdownCheckInterval=${AUTO_SHUTDOWN_CHECK_INTERVAL}
      - Workers__ForgotShutdownCheckInterval=${FORGOT_SHUTDOWN_CHECK_INTERVAL}
      - Workers__LunchReminderCheckInterval=${LUNCH_REMINDER_CHECK_INTERVAL}
      - Workers__WorkHoursAlertCheckInterval=${WORK_HOURS_ALERT_CHECK_INTERVAL}
    networks:
      - timesheet-network

  api:
    image: ghcr.io/${REPO_OWNER}/timesheet-api:${IMAGE_TAG}
    container_name: timesheet-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:5000"
    volumes:
      - ./data:/app/data
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Database__ConnectionString=Data Source=/app/data/timesheet.db
      - Database__EnableSensitiveDataLogging=false
      - Database__EnableDetailedErrors=false
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__ExpirationMinutes=${JWT_EXPIRATION_MINUTES}
      - Cors__AllowedOrigins__0=http://localhost:${FRONTEND_PORT}
      - Cors__AllowedOrigins__1=${FRONTEND_EXTERNAL_URL}
      - FrontendUrl=${FRONTEND_EXTERNAL_URL}
    networks:
      - timesheet-network

  frontend:
    image: ghcr.io/${REPO_OWNER}/timesheet-frontend:${IMAGE_TAG}
    container_name: timesheet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - timesheet-network

networks:
  timesheet-network:
    driver: bridge
